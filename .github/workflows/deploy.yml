name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# Force javascript actions to use Node 24 ahead of the June deadline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Upgraded local compilation runner to Node 24
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Static Site
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4